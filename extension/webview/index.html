<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncScript</title>
    <style>
        /* Essential styling for the validation popup */
        #workspace-error-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ef4444; /* red-500 */
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #workspace-error-popup.hidden {
            display: none;
            opacity: 0;
            bottom: 10px;
        }

        /* Loading spinner for the connecting view */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#1e1e1e] text-gray-200 p-4 font-sans text-sm select-none">

    <div id="deactivation-overlay" class="hidden fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-6 text-center transition-all">
        <div class="bg-gray-900 border border-red-500 p-8 rounded-lg shadow-2xl max-w-xs w-full">
            <h2 class="text-red-500 font-bold text-xl mb-2">Deactivating Room</h2>
            <p class="text-gray-400 text-xs mb-4">The admin has initiated a permanent shutdown of this room.</p>
            <div id="countdown-timer" class="text-5xl font-mono font-bold text-white mb-6">02:00</div>
            <button id="btn-stop-deactivation" class="hidden w-full bg-gray-700 hover:bg-gray-600 text-white py-2 rounded font-bold transition">
                STOP DEACTIVATION
            </button>
            <p id="wait-message" class="text-gray-500 text-[10px] mt-4">All data will be purged once the timer hits zero.</p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto">
        <div class="flex items-center justify-between border-b border-gray-700 pb-2 mb-6">
            <h2 class="text-blue-400 font-bold text-lg">SyncScript</h2>
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full transition-colors duration-500"></div>
        </div>

        <div id="view-connecting" class="hidden flex flex-col items-center justify-center py-12 space-y-4">
            <div class="spinner"></div>
            <p class="text-blue-400 animate-pulse font-medium">Connecting to Server...</p>
        </div>

        <div id="view-selection" class="space-y-4">
            <button id="nav-to-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded transition">Create Room</button>
            <button id="nav-to-join" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded transition">Join Room</button>
        </div>

        <div id="view-create" class="hidden space-y-4">
            <h3 class="text-gray-400 uppercase text-xs font-bold">New Room</h3>
            <input type="text" id="create-name" placeholder="Room Name (e.g. Backend Team)" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none focus:border-blue-500 mb-1 text-white">
            <input type="password" id="create-key" placeholder="Room Password" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none focus:border-blue-500 text-white">
            <button id="btn-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded transition font-bold">Initialize</button>
            <button class="nav-back w-full text-gray-500 hover:text-white text-xs mt-2 transition">← Back</button>
        </div>

        <div id="view-join" class="hidden space-y-4">
            <h3 class="text-gray-400 uppercase text-xs font-bold">Join Room</h3>
            <input type="text" id="join-id" placeholder="Room ID" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none mb-1 text-white">
            <input type="text" id="join-name" placeholder="Your Name" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none mb-1 text-white">
            <input type="password" id="join-key" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none text-white">
            <button id="btn-join" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded transition font-bold">Connect</button>
            <button class="nav-back w-full text-gray-500 hover:text-white text-xs mt-2 transition">← Back</button>
        </div>

        <div id="view-active" class="hidden space-y-4">
            <div class="bg-gray-900 border border-gray-700 p-3 rounded">
                <p id="display-room-name" class="text-blue-400 font-bold text-sm mb-1 uppercase tracking-wide">---</p>
                <p class="text-[10px] text-gray-500 uppercase">Room ID (Share this)</p>
                <div class="flex justify-between items-center mt-1">
                    <p id="active-room-id" class="text-blue-500 font-mono text-base break-all font-bold">---</p>
                    <button id="btn-copy-room-id" class="text-[10px] bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded border border-gray-600 transition">Copy</button>
                </div>
            </div>

            <div class="space-y-2">
                <button id="btn-sync-check" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-bold transition-colors shadow-lg">
                    Check Folder Sync
                </button>
                <div id="arch-sync-tree" class="hidden mt-2 pt-4 border-t border-gray-700 space-y-1 font-mono text-[11px]">
                </div>
            </div>

            <div class="space-y-1">
                <p class="text-[10px] text-gray-500 uppercase">Participants</p>
                <div id="member-list" class="space-y-1 mt-1 text-xs text-gray-300">
                </div>
            </div>

            <div class="pt-4 space-y-2">
                <button id="btn-leave" class="w-full bg-gray-800 text-gray-400 hover:text-white py-2 rounded transition border border-gray-700">Leave Room</button>
                <button id="btn-deactivate" class="hidden w-full border border-red-500/50 text-red-500 hover:bg-red-500 hover:text-white py-2 rounded transition font-bold">Deactivate Room</button>
            </div>
        </div>
    </div>
    
    <div id="workspace-error-popup" class="hidden">
        <span>⚠️</span>
        <span id="error-popup-message">Open a folder first</span>
    </div>

    <script src="treeView.js"></script>
    <script src="main.js"></script>
</body>
</html>
