<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1e1e1e] text-gray-200 p-4 font-sans text-sm select-none">
    <div id="app" class="max-w-md mx-auto">
        <div class="flex items-center justify-between border-b border-gray-700 pb-2 mb-6">
            <h2 class="text-blue-400 font-bold text-lg">SyncScript</h2>
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full"></div>
        </div>

        <div id="view-selection" class="space-y-4">
            <button id="nav-to-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded transition">Create Room</button>
            <button id="nav-to-join" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded transition">Join Room</button>
        </div>

        <div id="view-create" class="hidden space-y-4">
            <h3 class="text-gray-400 uppercase text-xs font-bold">New Room</h3>
            <input type="password" id="create-key" placeholder="Room Password" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none focus:border-blue-500">
            <button id="btn-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded">Initialize</button>
            <button class="nav-back w-full text-gray-500 hover:text-white text-xs mt-2">← Back</button>
        </div>

        <div id="view-join" class="hidden space-y-4">
            <h3 class="text-gray-400 uppercase text-xs font-bold">Join Room</h3>
            <input type="text" id="join-id" placeholder="Room ID" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none mb-1">
            <input type="text" id="join-name" placeholder="Your Name" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none mb-1">
            <input type="password" id="join-key" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-2 rounded outline-none">
            <button id="btn-join" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded">Connect</button>
            <button class="nav-back w-full text-gray-500 hover:text-white text-xs mt-2">← Back</button>
        </div>

        <div id="view-active" class="hidden space-y-4">
            <div class="bg-gray-900 border border-gray-700 p-3 rounded">
                <p class="text-[10px] text-gray-500 uppercase">Active Room ID</p>
                <div class="flex justify-between items-center">
                    <p id="active-room-id" class="text-blue-400 font-mono text-base break-all">---</p>
                </div>
            </div>
            
            <div id="member-list" class="space-y-1">
                <p class="text-[10px] text-gray-500 uppercase">Participants</p>
                </div>

            <button id="btn-leave" class="w-full border border-red-500 text-red-500 hover:bg-red-500 hover:text-white py-2 rounded transition">Leave Room</button>
            <p class="text-center text-[10px] text-gray-500 italic">Data saved to persistent SQLite</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
