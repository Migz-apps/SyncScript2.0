<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${webview.cspSource}; script-src 'unsafe-inline' ${webview.cspSource}; connect-src ws://localhost:4444;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="${styleUri}">
    <title>SyncScript P2P</title>
</head>
<body>
    <div class="container">
        <div class="connection-card">
            <div id="signal-icon" class="signal-searching"></div>
            <div class="info">
                <h3 id="status-text">Initializing...</h3>
                <p id="peer-count">0 Peers Nearby</p>
            </div>
        </div>

        <hr>

        <div class="room-info">
            <p><strong>Mode:</strong> Campfire Active</p>
            <p class="credit-small">Architecture by MAZIMPAKA Miguel</p>
        </div>

        <div id="editor-info">
            <p>Waiting for document sync...</p>
        </div>
    </div>

    <script type="module" src="${scriptUri}"></script>
</body>
</html>
